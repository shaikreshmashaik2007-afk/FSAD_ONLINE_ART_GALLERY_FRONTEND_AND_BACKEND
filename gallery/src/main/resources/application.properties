# -------------------------
# Application Configuration
# -------------------------

# Application name
spring.application.name=online-art-gallery

# Server Configuration
server.port=8082

# -------------------------
# Database Connection
# -------------------------
# Local default uses H2 file storage, but Docker/production can override with env vars.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/art_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# Hibernate / JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# H2 Console (local dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Format SQL output in logs
spring.jpa.properties.hibernate.format_sql=true

# -------------------------
# Server Configuration
# -------------------------


# -------------------------
# Logging
# -------------------------
logging.level.org.springframework=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT settings
jwt.secret=change-this-to-a-very-secure-and-long-secret-key
jwt.expiration-ms=86400000

