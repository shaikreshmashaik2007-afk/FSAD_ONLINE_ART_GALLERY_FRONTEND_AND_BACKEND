# -------------------------

# Application Configuration

# -------------------------

spring.application.name=online-art-gallery

# Railway dynamic port (MANDATORY)

server.port=${PORT:8080}

# -------------------------

# Database Configuration (Railway PostgreSQL)

# -------------------------

spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# -------------------------

# JPA / Hibernate

# -------------------------

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -------------------------

# Disable H2 (production)

# -------------------------

spring.h2.console.enabled=false

# -------------------------

# Logging (clean logs)

# -------------------------

logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF

# -------------------------

# JWT Configuration

# -------------------------

jwt.secret=${JWT_SECRET:change-this-to-a-very-secure-key}
jwt.expiration-ms=86400000

# -------------------------

# Razorpay Configuration (ENV ONLY)

# -------------------------

razorpay.key_id=${RAZORPAY_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET}
