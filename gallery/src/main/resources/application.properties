# -------------------------
# Application
# -------------------------
spring.application.name=online-art-gallery
server.port=${PORT:8080}

# -------------------------
# Database (Railway MySQL)
# -------------------------
spring.datasource.url=jdbc:mysql://root:YWbvRgdpzUzZnSnlsYjoWHVSjCceEWgU@mysql.railway.internal:3306/railway
spring.datasource.username=root
spring.datasource.password=YWbvRgdpzUzZnSnlsYjoWHVSjCceEWgU
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -------------------------
# JPA / Hibernate
# -------------------------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# -------------------------
# Disable H2
# -------------------------
spring.h2.console.enabled=false

# -------------------------
# Logging
# -------------------------
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO

# -------------------------
# JWT
# -------------------------
jwt.secret=${JWT_SECRET:change-this-to-a-very-secure-key}
jwt.expiration-ms=86400000

# -------------------------
# Razorpay
# -------------------------
razorpay.key_id=${RAZORPAY_KEY_ID}
razorpay.key_secret=${RAZORPAY_KEY_SECRET}
